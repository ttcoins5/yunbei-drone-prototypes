name: Deploy prototypes to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          rm -rf site
          mkdir -p site
          mkdir -p site/apps
          cp index.html site/index.html
          cp -R apps/miniapp site/apps/miniapp
          cp -R apps/admin site/admin
          cp -R shared site/shared
          mkdir -p site/miniapp
          cat <<'EOF' > site/miniapp/index.html
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <meta http-equiv="refresh" content="0; url=../apps/miniapp/">
              <title>正在跳转到小程序原型</title>
              <script>
                location.replace("../apps/miniapp/" + location.search + location.hash);
              </script>
            </head>
            <body>正在跳转到小程序原型...</body>
          </html>
          EOF
          touch site/.nojekyll
          find site -name ".DS_Store" -delete

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
