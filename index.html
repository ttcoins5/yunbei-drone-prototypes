<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="奉飞飞无人机平台原型入口">
  <title>奉飞飞无人机平台原型</title>
  <style>
    :root { color-scheme: light; --ink:#14212b; --muted:#62717d; --line:#e3e8ec; --brand:#0b6f7e; --soft:#f5f8fa; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:var(--ink); background:#eef3f5; }
    main { width:min(1040px, calc(100% - 40px)); margin:0 auto; padding:64px 0; }
    header { margin-bottom:28px; }
    h1 { margin:0 0 10px; font-size:34px; letter-spacing:0; }
    p { margin:0; color:var(--muted); line-height:1.7; }
    .grid { display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:18px; margin-top:30px; }
    a { display:grid; min-height:180px; align-content:space-between; padding:24px; border:1px solid var(--line); border-radius:8px; color:inherit; background:#fff; text-decoration:none; box-shadow:0 16px 36px rgba(18,33,43,.08); }
    a:hover { border-color:#9ebdc4; transform:translateY(-1px); }
    strong { display:block; font-size:22px; }
    small { color:var(--muted); font-size:14px; line-height:1.7; }
    span { color:var(--brand); font-weight:800; }
    footer { margin-top:28px; color:#7b8791; font-size:13px; }
    @media (max-width:720px) { main { width:min(100% - 28px, 1040px); padding:36px 0; } h1 { font-size:26px; } .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>奉飞飞无人机平台原型</h1>
      <p>统一管理小程序端和后台管理端原型，共用图片与业务数据，适合评审、演示和交接。</p>
    </header>
    <section class="grid" aria-label="原型入口">
      <a href="./apps/miniapp/">
        <strong>小程序原型</strong>
        <small>面向用户、飞手和运营相关移动端流程，包含首页、商品、订单、我的、任务大厅等页面。</small>
        <span>打开 miniapp</span>
      </a>
      <a href="./admin/">
        <strong>后台管理原型</strong>
        <small>面向运营管理后台，包含首页配置、商品、订单、用户、飞手、培训、发票等模块。</small>
        <span>打开 admin</span>
      </a>
    </section>
    <footer>GitHub Pages: /apps/miniapp/、/admin/、/shared/</footer>
  </main>
</body>
</html>
